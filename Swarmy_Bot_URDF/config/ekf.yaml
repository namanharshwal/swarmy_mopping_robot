# ekf.yaml - robot_localization EKF - Swarmy Bot - FIXED FINAL
# Place at: ~/swarmy_ws/src/Swarmy_Bot_URDF/config/ekf.yaml

frequency:             50
sensor_timeout:        0.1
two_d_mode:            true
transform_time_offset: 0.0
transform_timeout:     0.1
publish_tf:            true
publish_acceleration:  false

map_frame:       map
odom_frame:      odom
base_link_frame: base_footprint
world_frame:     odom

# Wheel odometry - fuse x, y, yaw pose + vx, vyaw twist
odom0: /wheel/odom
odom0_config: [true,  true,  false,
               false, false, true,
               true,  false, false,
               false, false, true,
               false, false, false]
odom0_differential: false
odom0_relative:     false
odom0_queue_size:   20

# IMU - MPU6050 - NO magnetometer - fuse ONLY angular_velocity.z (vyaw)
# ax=false ay=false CRITICAL - prevents ghost drift from gravity injection
imu0: /imu/data_raw
imu0_config: [false, false, false,
              false, false, false,
              false, false, false,
              false, false, true,
              false, false, false]
imu0_differential:                      false
imu0_relative:                          true
imu0_queue_size:                        50
imu0_remove_gravitational_acceleration: false

